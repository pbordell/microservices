services:
  eurekaservice:
    build: eurekaService/
    image: eurekaservice:latest
    ports:
      - "8081:8081"
    networks:
      observabilitysandbox:
        aliases:
          - eurekaService
          - eurekaservice
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  micro-oauth:
    build: micro-oauth/
    image: micro-oauth:latest
    ports:
      - "9191:9191"
    networks:
      - observabilitysandbox
    depends_on:
      eurekaservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9191 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  apigateway:
    build: apiGateway/
    image: apigateway:latest
    ports:
      - "8082:8082"
    networks:
      - observabilitysandbox
    depends_on:
      eurekaservice:
        condition: service_healthy
      micro-oauth:
        condition: service_healthy

  micro-api-quarkus:
    build: micro-api-quarkus/
    image: micro-api-quarkus:latest
    ports:
      - "8085:8085"
    networks:
      - observabilitysandbox
    depends_on:
      eurekaservice:
        condition: service_healthy

  micro-core-spring-boot:
    build: micro-core-spring-boot/
    image: micro-core-spring-boot:latest
    ports:
      - "8083:8083"
    networks:
      - observabilitysandbox
    depends_on:
      eurekaservice:
        condition: service_healthy

  micro-report-struts:
    build: micro-report-struts/
    image: micro-report-struts:latest
    container_name: micro-report-struts
    ports:
      - "8084:8084"
    networks:
      - observabilitysandbox

networks:
  observabilitysandbox:
    external: true
